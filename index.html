<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A little question for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#bfe3ff;
    --sky-bottom:#eaf6ff;
    --ground:#ffffff;
    --ink:#27344a;        /* penguin body */
    --cream:#fff8ef;      /* belly + face */
    --beak:#ff9d3d;
    --feet:#ff8a2b;
    --cheek:#ff9fb0;
    --yes:#ff5a6e;        /* warm invite red */
    --yes-dark:#e83d57;
    --blue:#3f6fd6;       /* july 4th blue accent */
    --no:#9bb0c6;         /* muted, on purpose */
    --no-dark:#7e95ae;
    --tear:#7fc8ff;
    --text:#2a3650;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  html,body{height:100%;margin:0}

  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--text);
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:24px 16px;
  }

  /* snowy hill behind everything */
  .ground{
    position:fixed;
    left:-10%;
    right:-10%;
    bottom:-42vh;
    height:62vh;
    background:var(--ground);
    border-radius:50% 50% 0 0;
    box-shadow:0 -10px 40px rgba(120,160,210,.25);
    z-index:0;
  }

  .sky-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

  .snow{
    position:absolute;
    top:-12px;
    border-radius:50%;
    background:#fff;
    opacity:.9;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{transform:translateY(-10vh) translateX(0)}
    100%{transform:translateY(112vh) translateX(var(--drift,10px))}
  }

  .star{position:absolute;color:#fff;opacity:.7;font-size:12px;animation:twinkle 3s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.85}}

  /* ---- card ---- */
  .card{
    position:relative;
    z-index:2;
    width:min(92vw,440px);
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,.9);
    border-radius:30px;
    padding:30px 26px 34px;
    text-align:center;
    box-shadow:0 24px 60px rgba(80,120,180,.28);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .card.hidden{display:none}

  .penguin-wrap{width:170px;height:200px;margin-top:-6px}
  .penguin{width:100%;height:100%;display:block;transform-origin:50% 92%;animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(-1.5deg)}}

  /* mood toggles */
  .penguin .happy-eyes,
  .penguin .tear,
  .penguin .brow{opacity:0}
  .penguin .smile-small{opacity:1}
  .penguin .smile-frown{opacity:0}

  .penguin.is-sad .brow{opacity:1}
  .penguin.is-sad .tear{opacity:1;animation:drip 1.6s ease-in infinite}
  .penguin.is-sad .smile-small{opacity:0}
  .penguin.is-sad .smile-frown{opacity:1}
  @keyframes drip{0%{transform:translateY(0);opacity:0}25%{opacity:1}100%{transform:translateY(26px);opacity:0}}

  .penguin.is-happy .eyes{opacity:0}
  .penguin.is-happy .happy-eyes{opacity:1}
  .penguin.is-happy .smile-small{opacity:0}
  .penguin.is-happy .smile-big{opacity:1}
  .penguin .smile-big{opacity:0}
  .penguin.is-happy .flipper-l{transform:rotate(38deg);transform-origin:62px 120px}
  .penguin.is-happy .flipper-r{transform:rotate(-38deg);transform-origin:138px 120px}
  .penguin.is-happy{animation:dance 0.7s ease-in-out infinite}
  @keyframes dance{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

  .question{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:clamp(1.45rem,5.2vw,2.05rem);
    line-height:1.25;
    margin:0;
    color:var(--text);
    min-height:2.4em;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .buttons{display:flex;align-items:center;justify-content:center;gap:16px;width:100%;min-height:66px}

  button{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    border:none;
    border-radius:999px;
    cursor:pointer;
    color:#fff;
    font-size:clamp(1.05rem,4vw,1.35rem);
    padding:14px 30px;
    transition:transform .28s cubic-bezier(.2,1.4,.4,1),background .2s,box-shadow .2s;
    touch-action:manipulation;
  }
  button:active{filter:brightness(.95)}
  button:focus-visible{outline:3px solid var(--blue);outline-offset:3px}

  .btn-yes{background:var(--yes);box-shadow:0 8px 0 var(--yes-dark)}
  .btn-yes:active{transform:translateY(4px) scale(var(--yes-scale,1));box-shadow:0 4px 0 var(--yes-dark)}
  .btn-no{background:var(--no);box-shadow:0 8px 0 var(--no-dark)}
  .btn-no:active{transform:translateY(4px) scale(var(--no-scale,1));box-shadow:0 4px 0 var(--no-dark)}

  /* celebration */
  .yay-title{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:clamp(1.8rem,7vw,2.6rem);
    margin:0;
    color:var(--yes);
  }
  .yay-text{font-size:clamp(1rem,4vw,1.2rem);font-weight:700;margin:0;color:var(--text)}
  .yay-date{
    margin:4px 0 0;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    color:var(--blue);
    font-size:clamp(1rem,4vw,1.15rem);
    background:#fff;
    padding:8px 18px;
    border-radius:999px;
    box-shadow:0 6px 18px rgba(63,111,214,.18);
  }
  .cal-buttons{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:4px}
  .cal-btn{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:clamp(.95rem,3.6vw,1.1rem);
    text-decoration:none;
    text-align:center;
    padding:13px 18px;
    border-radius:16px;
    border:2px solid var(--blue);
    color:var(--blue);
    background:#fff;
    cursor:pointer;
    transition:transform .15s,background .15s,color .15s;
  }
  .cal-btn:active{transform:translateY(2px)}
  .cal-google{background:var(--blue);color:#fff}
  .cal-ics{color:var(--blue)}

  .confetti,.firework{position:fixed;z-index:5;pointer-events:none}
  .confetti{top:-14px;width:10px;height:14px;border-radius:2px;animation:confetti-fall linear forwards}
  @keyframes confetti-fall{
    0%{transform:translateY(-10vh) rotate(0);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:1}
  }
  .firework{width:7px;height:7px;border-radius:50%;animation:spark 1.2s ease-out forwards;box-shadow:0 0 9px 2px currentColor}
  @keyframes spark{
    0%{transform:translate(0,0) scale(1.3);opacity:1}
    65%{opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(.25);opacity:0}
  }
  .flash{position:fixed;z-index:5;pointer-events:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 24px 10px #fff;animation:flash .55s ease-out forwards}
  @keyframes flash{0%{transform:scale(.4);opacity:.95}100%{transform:scale(4.5);opacity:0}}
  .rocket{position:fixed;z-index:5;pointer-events:none;width:4px;height:15px;border-radius:3px;box-shadow:0 0 8px 2px currentColor;transition:top .5s cubic-bezier(.18,.7,.3,1),opacity .5s}

  @media (prefers-reduced-motion: reduce){
    .snow,.penguin,.star,.confetti,.firework,.flash,.rocket,.penguin.is-happy{animation:none!important}
    button{transition:background .2s}
  }
</style>
</head>
<body>

  <div class="ground"></div>
  <div class="sky-layer" id="sky"></div>

  <!-- ============ THE QUESTION SCREEN ============ -->
  <main class="card" id="ask-screen">
    <div class="penguin-wrap">
      <!-- penguin: mood is controlled by .is-sad / .is-happy classes -->
      <svg class="penguin" id="penguin" viewBox="0 0 200 210" aria-hidden="true">
        <!-- stubby flippers (behind body) -->
        <ellipse class="flipper-l" cx="40"  cy="124" rx="15" ry="32" fill="#1f2a3d" transform="rotate(14 40 124)"/>
        <ellipse class="flipper-r" cx="160" cy="124" rx="15" ry="32" fill="#1f2a3d" transform="rotate(-14 160 124)"/>
        <!-- little feet -->
        <ellipse cx="80"  cy="198" rx="18" ry="10" fill="var(--feet)"/>
        <ellipse cx="120" cy="198" rx="18" ry="10" fill="var(--feet)"/>
        <!-- fuzzy head tuft (pokes above the hood) -->
        <g fill="#1f2a3d">
          <path d="M90 34 C89 21 95 19 96 33 Z"/>
          <path d="M99 33 C99 17 105 17 105 33 Z"/>
          <path d="M108 34 C108 21 114 21 113 33 Z"/>
        </g>
        <!-- dark rounded body / hood -->
        <path d="M100 30 C152 30 170 72 170 116 C170 168 142 198 100 198 C58 198 30 168 30 116 C30 72 48 30 100 30 Z" fill="var(--ink)"/>
        <!-- white face + belly front -->
        <path d="M100 52 C140 52 156 86 156 126 C156 170 132 194 100 194 C68 194 44 170 44 126 C44 86 60 52 100 52 Z" fill="var(--cream)"/>
        <!-- cheeks -->
        <ellipse cx="62"  cy="106" rx="11" ry="6.5" fill="var(--cheek)" opacity=".55"/>
        <ellipse cx="138" cy="106" rx="11" ry="6.5" fill="var(--cheek)" opacity=".55"/>
        <!-- sad brows: inner corners RAISED = worried, not angry -->
        <g class="brow" stroke="#1f2a3d" stroke-width="4" stroke-linecap="round">
          <line x1="67" y1="80" x2="90" y2="72"/>
          <line x1="133" y1="80" x2="110" y2="72"/>
        </g>
        <!-- big shiny eyes -->
        <g class="eyes">
          <circle cx="80"  cy="92" r="13" fill="#1f2a3d"/>
          <circle cx="120" cy="92" r="13" fill="#1f2a3d"/>
          <circle cx="84"  cy="88" r="4.6" fill="#fff"/>
          <circle cx="124" cy="88" r="4.6" fill="#fff"/>
          <circle cx="76"  cy="96" r="2.2" fill="#fff"/>
          <circle cx="116" cy="96" r="2.2" fill="#fff"/>
        </g>
        <!-- happy (closed) eyes -->
        <g class="happy-eyes" fill="none" stroke="#1f2a3d" stroke-width="4.5" stroke-linecap="round">
          <path d="M70 94 Q80 82 90 94"/>
          <path d="M110 94 Q120 82 130 94"/>
        </g>
        <!-- tear -->
        <path class="tear" d="M132 99 q5 9 0 13 q-5 -4 0 -13 Z" fill="var(--tear)"/>
        <!-- tiny beak -->
        <path d="M94 102 L106 102 L100 112 Z" fill="var(--beak)"/>
        <!-- mouths -->
        <path class="smile-small" d="M91 120 Q100 127 109 120" fill="none" stroke="#1f2a3d" stroke-width="3" stroke-linecap="round"/>
        <path class="smile-frown" d="M91 125 Q100 119 109 125" fill="none" stroke="#1f2a3d" stroke-width="3" stroke-linecap="round"/>
        <path class="smile-big" d="M88 118 Q100 134 112 118 Q100 123 88 118 Z" fill="#ff7a85" stroke="#1f2a3d" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="question" id="question"></p>

    <div class="buttons">
      <button class="btn-yes" id="yesBtn" type="button">Yes!</button>
      <button class="btn-no"  id="noBtn"  type="button">No</button>
    </div>
  </main>

  <!-- ============ THE CELEBRATION SCREEN ============ -->
  <main class="card hidden" id="yay-screen">
    <div class="penguin-wrap">
      <svg class="penguin is-happy" viewBox="0 0 200 210" aria-hidden="true">
        <ellipse class="flipper-l" cx="40"  cy="124" rx="15" ry="32" fill="#1f2a3d" transform="rotate(14 40 124)"/>
        <ellipse class="flipper-r" cx="160" cy="124" rx="15" ry="32" fill="#1f2a3d" transform="rotate(-14 160 124)"/>
        <ellipse cx="80"  cy="198" rx="18" ry="10" fill="var(--feet)"/>
        <ellipse cx="120" cy="198" rx="18" ry="10" fill="var(--feet)"/>
        <g fill="#1f2a3d">
          <path d="M90 34 C89 21 95 19 96 33 Z"/>
          <path d="M99 33 C99 17 105 17 105 33 Z"/>
          <path d="M108 34 C108 21 114 21 113 33 Z"/>
        </g>
        <path d="M100 30 C152 30 170 72 170 116 C170 168 142 198 100 198 C58 198 30 168 30 116 C30 72 48 30 100 30 Z" fill="var(--ink)"/>
        <path d="M100 52 C140 52 156 86 156 126 C156 170 132 194 100 194 C68 194 44 170 44 126 C44 86 60 52 100 52 Z" fill="var(--cream)"/>
        <ellipse cx="62"  cy="106" rx="11" ry="6.5" fill="var(--cheek)" opacity=".55"/>
        <ellipse cx="138" cy="106" rx="11" ry="6.5" fill="var(--cheek)" opacity=".55"/>
        <g class="happy-eyes" fill="none" stroke="#1f2a3d" stroke-width="4.5" stroke-linecap="round" style="opacity:1">
          <path d="M70 94 Q80 82 90 94"/>
          <path d="M110 94 Q120 82 130 94"/>
        </g>
        <path d="M94 102 L106 102 L100 112 Z" fill="var(--beak)"/>
        <path class="smile-big" d="M88 118 Q100 134 112 118 Q100 123 88 118 Z" fill="#ff7a85" stroke="#1f2a3d" stroke-width="2.5" stroke-linejoin="round" style="opacity:1"/>
      </svg>
    </div>
    <h1 class="yay-title">Yay!! 🎉</h1>
    <p class="yay-text" id="yayText"></p>
    <p class="yay-date" id="yayDate"></p>
    <div class="cal-buttons">
      <a class="cal-btn cal-google" id="gcalBtn" target="_blank" rel="noopener">📅 Add to Google Calendar</a>
      <button class="cal-btn cal-ics" id="icsBtn" type="button">🍎 Apple / Outlook (.ics)</button>
    </div>
  </main>

<script>
  /* =========================================================
     EDIT ME  ->  Put your real questions here, in order.
     The FIRST one shows first. Each "No" reveals the NEXT one.
     After the last, it loops back to the first.
     ========================================================= */
  const questions = [
    "Will you spend the 4th of July weekend with me?",
    "Are you suuure? I already started planning 🥺",
    "What if I told you I have booked the tickets?",
    "I have heard ATL is the place to be for July 4th when you are in it!",
    "This time there will be Hanis pastry and other surprises!",
    "I am prepared to sleep on the couch..",
    "Pretty please, with a cherry on top?"
  ];

  /* The "No" button gets more desperate each tap. Edit freely. */
  const noLabels = ["No", "Are you sure?", "Really?", "Hmm?", "Please?", "🥺"];

  /* Celebration copy. Edit the date line to your plan. */
  const yayMessage = "It's a date. You just made two cuties very happy.";
  const yayDate    = "📍 July 4th weekend, with me 💕";

  /* OPTIONAL: get a heads-up email when she says Yes.
     1. Go to web3forms.com, enter your email, copy the access key it sends you.
     2. Paste it between the quotes below.
     Leave it as-is to skip notifications entirely. */
  const WEB3FORMS_KEY = "PASTE-YOUR-ACCESS-KEY-HERE";

  /* EDIT ME -> the event her calendar buttons will add.
     Dates are YYYYMMDD. For an all-day span, "end" is the day AFTER the last
     day (it is exclusive), so Jul 3 -> Jul 6 covers Fri Jul 3 through Sun Jul 5.
     To make it a timed event instead, set allDay:false and use
     start:"20260703T180000", end:"20260703T220000" (her local time). */
  const EVENT = {
    title:    "July 4th weekend together 🐧",
    location: "",                       // optional, e.g. "My place"
    details:  "Can't wait to spend it with you 💕",
    start:    "20260704",
    end:      "20260706",
    allDay:   true
  };

  /* ============ logic (you usually don't need to touch this) ============ */
  const qEl   = document.getElementById('question');
  const yesEl = document.getElementById('yesBtn');
  const noEl  = document.getElementById('noBtn');
  const peng  = document.getElementById('penguin');
  const ask   = document.getElementById('ask-screen');
  const yay   = document.getElementById('yay-screen');

  let idx = 0;     // which question
  let nos = 0;     // how many times No was tapped

  function render(){
    qEl.textContent = questions[idx];
    noEl.textContent = noLabels[Math.min(nos, noLabels.length - 1)];

    // grow Yes, shrink No
    const yesScale = Math.min(1 + nos * 0.14, 1.7);
    const noScale  = Math.max(1 - nos * 0.12, 0.55);
    yesEl.style.transform = 'scale(' + yesScale + ')';
    yesEl.style.setProperty('--yes-scale', yesScale);
    noEl.style.transform  = 'scale(' + noScale + ')';
    noEl.style.setProperty('--no-scale', noScale);

    // mood
    peng.classList.toggle('is-sad', nos >= 2);
  }

  noEl.addEventListener('click', () => {
    nos++;
    idx = (idx + 1) % questions.length;  // loop the questions
    render();
  });

  yesEl.addEventListener('click', celebrate);

  function celebrate(){
    // Show the happy screen FIRST, so a slow or failed network never ruins the moment.
    document.getElementById('yayText').textContent = yayMessage;
    document.getElementById('yayDate').textContent = yayDate;
    ask.classList.add('hidden');
    yay.classList.remove('hidden');
    burstConfetti();
    fireworksShow();
    notifyYes();
    setupCalendar();
  }

  function setupCalendar(){
    // Google Calendar: opens a pre-filled event she just saves.
    const g = new URLSearchParams({
      action: "TEMPLATE",
      text: EVENT.title,
      dates: EVENT.start + "/" + EVENT.end,
      details: EVENT.details,
      location: EVENT.location
    });
    document.getElementById('gcalBtn').href =
      "https://calendar.google.com/calendar/render?" + g.toString();

    // .ics file for Apple Calendar / Outlook.
    document.getElementById('icsBtn').addEventListener('click', downloadIcs);
  }

  function downloadIcs(){
    const esc = (s) => String(s)
      .replace(/\\/g, "\\\\").replace(/;/g, "\\;")
      .replace(/,/g, "\\,").replace(/\n/g, "\\n");
    const dt = EVENT.allDay
      ? "DTSTART;VALUE=DATE:" + EVENT.start + "\r\nDTEND;VALUE=DATE:" + EVENT.end
      : "DTSTART:" + EVENT.start + "\r\nDTEND:" + EVENT.end;
    const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Penguin Invite//EN",
      "BEGIN:VEVENT",
      "UID:" + stamp + "@penguin-invite",
      "DTSTAMP:" + stamp,
      dt,
      "SUMMARY:" + esc(EVENT.title),
      "DESCRIPTION:" + esc(EVENT.details),
      "LOCATION:" + esc(EVENT.location),
      "END:VEVENT","END:VCALENDAR"
    ].join("\r\n");
    const blob = new Blob([ics], { type: "text/calendar" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "our-weekend.ics";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function notifyYes(){
    if (!WEB3FORMS_KEY || WEB3FORMS_KEY.startsWith("PASTE")) return; // not set up, skip
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({
        access_key: WEB3FORMS_KEY,
        subject: "She said YES 🎉",
        from_name: "Penguin Invite",
        message:
          "She said YES!\n\n" +
          "On the question: " + questions[idx] + "\n" +
          "Times she tapped No first: " + nos + "\n" +
          "When: " + new Date().toLocaleString()
      })
    }).catch(function(){ /* offline or blocked: the celebration already happened, so ignore */ });
  }

  /* ---------- ambient snow + stars ---------- */
  (function buildSky(){
    const sky = document.getElementById('sky');
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) return;
    for (let i = 0; i < 34; i++){
      const s = document.createElement('div');
      s.className = 'snow';
      const size = 3 + Math.random() * 6;
      s.style.width = s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.animationDuration = (6 + Math.random() * 9) + 's';
      s.style.animationDelay = (-Math.random() * 12) + 's';
      s.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      s.style.opacity = 0.5 + Math.random() * 0.5;
      sky.appendChild(s);
    }
    for (let i = 0; i < 10; i++){
      const st = document.createElement('div');
      st.className = 'star';
      st.textContent = '✦';
      st.style.left = Math.random() * 100 + 'vw';
      st.style.top = Math.random() * 45 + 'vh';
      st.style.animationDelay = (Math.random() * 3) + 's';
      sky.appendChild(st);
    }
  })();

  /* ---------- celebration effects (red / white / blue + pink) ---------- */
  const PARTY = ['#ff5a6e', '#ffffff', '#3f6fd6', '#ff9fb0', '#ffd23f'];

  function burstConfetti(){
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    for (let i = 0; i < 110; i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = PARTY[i % PARTY.length];
      c.style.animationDuration = (2.4 + Math.random() * 2.2) + 's';
      c.style.animationDelay = (Math.random() * 1.2) + 's';
      c.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 6000);
    }
  }

  function fireworksShow(){
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const colors = ['#ff5a6e', '#ffffff', '#3f6fd6']; // red / white / blue
    let t = 0;
    for (let b = 0; b < 11; b++){
      setTimeout(() => {
        const cx = 12 + Math.random() * 76;
        const cy = 14 + Math.random() * 38;
        launchFirework(cx, cy, colors[Math.floor(Math.random() * colors.length)]);
      }, t);
      t += 280 + Math.random() * 360;
    }
  }

  function launchFirework(cx, cy, color){
    // a rocket streaks up from the bottom, then bursts at (cx, cy)
    const rocket = document.createElement('div');
    rocket.className = 'rocket';
    rocket.style.left = cx + 'vw';
    rocket.style.top = '102vh';
    rocket.style.background = color;
    rocket.style.color = color;
    document.body.appendChild(rocket);
    requestAnimationFrame(() => {
      rocket.style.top = cy + 'vh';
      rocket.style.opacity = '.2';
    });
    setTimeout(() => { rocket.remove(); burstAt(cx, cy, color); }, 500);
  }

  function burstAt(cx, cy, color){
    const flash = document.createElement('div');
    flash.className = 'flash';
    flash.style.left = cx + 'vw';
    flash.style.top = cy + 'vh';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 560);

    const n = 36;
    for (let i = 0; i < n; i++){
      const f = document.createElement('div');
      f.className = 'firework';
      f.style.left = cx + 'vw';
      f.style.top = cy + 'vh';
      f.style.background = color;
      f.style.color = color;                 // drives the glow (box-shadow currentColor)
      const ang = (i / n) * Math.PI * 2 + Math.random() * 0.12;
      const dist = 80 + Math.random() * 80;
      f.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
      f.style.setProperty('--dy', (Math.sin(ang) * dist + 45) + 'px'); // +gravity, so they fall
      f.style.animationDelay = (Math.random() * 0.06) + 's';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1400);
    }
  }

  render();
</script>
</body>
</html>
